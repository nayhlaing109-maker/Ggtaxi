<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi User - Full Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); overflow: hidden; }
        #map { height: 100vh; width: 100%; position: absolute; top: 0; z-index: 1; }
        #center-pin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%); z-index: 10; pointer-events: none; display: none; }
        .bottom-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: white; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 20px; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
        .input-group { display: flex; align-items: center; background: #f8f9fa; border-radius: 12px; padding: 5px 15px; border: 1px solid #eee; margin-bottom: 10px; }
        .input-group input { border: none; background: transparent; width: 100%; padding: 12px; font-size: 15px; outline: none; }
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-pick { width: 100%; background: #e8eaed; color: #3c4043; border: none; padding: 12px; border-radius: 12px; margin-top: 5px; font-weight: bold; cursor: pointer; }
        .driver-card { display: none; background: #e9f7ef; padding: 15px; border-radius: 12px; border: 1px solid #28a745; text-align: left; margin-top: 10px; }
        .btn-call { display: block; background: #28a745; color: white; text-decoration: none; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; margin-top: 10px; }
        .loader-area { display: none; text-align: center; padding: 10px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #search-overlay { display: none; position: fixed; inset: 0; background: white; z-index: 2000; padding: 20px; overflow-y: auto; }
        #search-input { width: 100%; padding: 15px; border: 2px solid var(--primary); border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; }
        .result-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

    <div id="center-pin"><img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" width="45"></div>
    <div id="map"></div>

    <div class="bottom-sheet">
        <div id="booking-ui">
            <div class="input-group" onclick="openSearch()">
                <div style="width:10px; height:10px; background:#ea4335; border-radius:50%; margin-right:10px;"></div>
                <input type="text" id="dest-display" placeholder="ဘယ်ကိုသွားမလဲ?" readonly>
            </div>
            <button class="btn-pick" onclick="startMapPick()">📍 မြေပုံပေါ်တွင် ရွေးမည်</button>
            <div id="fare-area" style="text-align:center; padding: 10px; font-weight:bold; display:none;">
                ခန့်မှန်းခြေ: <span id="fare-text">0</span> ကျပ်
            </div>
            <button id="book-btn" class="btn-main" style="display:none; margin-top:10px;" onclick="sendBooking()">🚕 အခုပဲခေါ်ဆိုမည်</button>
        </div>

        <div id="confirm-ui" style="display:none; text-align:center;">
            <p id="picked-address" style="font-weight:bold; margin-bottom:15px;">နေရာရွေးချယ်ပါ</p>
            <button class="btn-main" onclick="confirmPick()">ဤနေရာကို အတည်ပြုသည်</button>
            <button class="btn-pick" onclick="cancelPick()">ပယ်ဖျက်မည်</button>
        </div>

        <div id="tracking-ui" class="loader-area">
            <div id="spinner" class="spinner"></div>
            <div id="status-text" style="font-weight: bold; margin-bottom: 10px;">ယာဉ်မောင်း ရှာဖွေနေပါသည်...</div>
            <div id="driver-card" class="driver-card">
                <div>ယာဉ်အမှတ်: <b id="carNo">-</b></div>
                <div>ဖုန်း: <b id="phone">-</b></div>
                <a id="callLink" href="#" class="btn-call">📞 အခုပဲ ဖုန်းခေါ်မည်</a>
            </div>
        </div>
    </div>

    <div id="search-overlay">
        <button onclick="closeSearch()" style="border:none; background:none; font-size:24px; margin-bottom:15px;">✕</button>
        <input type="text" id="search-input" placeholder="နေရာရိုက်ရှာပါ..." oninput="searchLocation(this.value)">
        <div id="search-results"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCkooRElTxGdSkQI5ya8t3CKxoLSKjOQOs",
            authDomain: "ggtaxi-29fa2.firebaseapp.com",
            databaseURL: "https://ggtaxi-29fa2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ggtaxi-29fa2",
            storageBucket: "ggtaxi-29fa2.firebasestorage.app",
            messagingSenderId: "826464431760",
            appId: "1:826464431760:web:3569926d691d5b85b8f215"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        var map = L.map('map', { zoomControl: false }).setView([21.9588, 96.0891], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        let uLat, uLng, dLat, dLng, isPicking = false;
        let routeLayer = null, destMarker = null, driverMarker = null;
        let currentFare = 0, currentMile = 0, currentPolyline = null;

        navigator.geolocation.getCurrentPosition(p => {
            uLat = p.coords.latitude; uLng = p.coords.longitude;
            map.setView([uLat, uLng], 15);
            L.circleMarker([uLat, uLng], {color: '#1a73e8', radius: 7}).addTo(map);
        });

        function openSearch() { document.getElementById('search-overlay').style.display = 'block'; }
        function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; }

        async function searchLocation(q) {
            if(q.length < 3) return;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&countrycodes=mm&limit=5`);
            const data = await res.json();
            let html = '';
            data.forEach(item => {
                html += `<div class="result-item" onclick="selectLocation(${item.lat}, ${item.lon}, '${item.display_name}')">
                            📍 ${item.display_name.split(',')[0]}<br><small>${item.display_name}</small>
                         </div>`;
            });
            document.getElementById('search-results').innerHTML = html;
        }

        function selectLocation(lat, lon, name) {
            dLat = lat; dLng = lon;
            document.getElementById('dest-display').value = name.split(',')[0];
            closeSearch();
            processRoute();
        }

        function startMapPick() {
            isPicking = true;
            document.getElementById('center-pin').style.display = 'block';
            document.getElementById('booking-ui').style.display = 'none';
            document.getElementById('confirm-ui').style.display = 'block';
            map.on('moveend', async () => {
                if(isPicking) {
                    let c = map.getCenter();
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${c.lat}&lon=${c.lng}`);
                    const data = await res.json();
                    document.getElementById('picked-address').innerText = data.display_name.split(',')[0] || "နေရာမသိပါ";
                }
            });
        }

        function confirmPick() {
            let c = map.getCenter();
            dLat = c.lat; dLng = c.lng;
            document.getElementById('dest-display').value = document.getElementById('picked-address').innerText;
            cancelPick();
            processRoute();
        }

        function cancelPick() {
            isPicking = false;
            document.getElementById('center-pin').style.display = 'none';
            document.getElementById('confirm-ui').style.display = 'none';
            document.getElementById('booking-ui').style.display = 'block';
        }

        async function processRoute() {
            if(routeLayer) map.removeLayer(routeLayer);
            if(destMarker) map.removeLayer(destMarker);

            destMarker = L.marker([dLat, dLng]).addTo(map);
            const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${uLng},${uLat};${dLng},${dLat}?overview=full&geometries=geojson`);
            const data = await res.json();

            if(data.code === 'Ok') {
                currentPolyline = data.routes[0].geometry;
                routeLayer = L.geoJSON(currentPolyline, {style: {color: '#1a73e8', weight: 5}}).addTo(map);
                map.fitBounds(routeLayer.getBounds(), {padding: [50, 50]});

                currentMile = (data.routes[0].distance / 1609.34).toFixed(2);
                currentFare = Math.max(1500, Math.round(currentMile * 1000));
                
                document.getElementById('fare-text').innerText = currentFare;
                document.getElementById('fare-area').style.display = 'block';
                document.getElementById('book-btn').style.display = 'block';
            }
        }

        function sendBooking() {
            if(!dLat || !currentFare) return alert("ကျေးဇူးပြု၍ နေရာအရင်ရွေးပါ");
            
            const bookingRef = db.ref('bookings').push();
            bookingRef.set({
                status: 'pending',
                dest: document.getElementById('dest-display').value,
                fare: currentFare,
                mile: currentMile,
                lat: uLat, lng: uLng,
                destLat: dLat, destLng: dLng,
                polyline: currentPolyline,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('booking-ui').style.display = 'none';
                document.getElementById('tracking-ui').style.display = 'block';
                listenToBooking(bookingRef.key);
            }).catch(err => alert("Error: " + err.message));
        }

        function listenToBooking(id) {
            const currentRef = db.ref('bookings/' + id);
            currentRef.on('value', (snap) => {
                const data = snap.val();
                if(!data) return;
                if(data.status === 'on_going') {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('status-text').innerText = "ယာဉ်မောင်း လက်ခံလိုက်ပါပြီ ✅";
                    document.getElementById('driver-card').style.display = 'block';
                    document.getElementById('carNo').innerText = data.driver_car || "-";
                    document.getElementById('phone').innerText = data.driver_phone || "-";
                    document.getElementById('callLink').href = "tel:" + data.driver_phone;
                    if(data.driver_lat && data.driver_lng) {
                        if (driverMarker) map.removeLayer(driverMarker);
                        driverMarker = L.marker([data.driver_lat, data.driver_lng], {
                            icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/854/854831.png', iconSize: [35, 35] })
                        }).addTo(map);
                    }
                } else if(data.status === 'ended') {
                    currentRef.off();
                    alert("ခရီးစဉ်ပြီးဆုံးပါပြီ။");
                    window.location.reload();
                }
            });
        }
    </script>
</body>
</html>
