<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi User - GG Taxi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f8f9fa; }
        #map { height: 60vh; width: 100%; }
        .bottom-sheet { padding: 20px; background: white; border-top-left-radius: 25px; border-top-right-radius: 25px; margin-top: -20px; position: relative; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); text-align: center; }
        .input-box { background: #f1f3f4; border-radius: 12px; padding: 12px; margin-bottom: 15px; text-align: left; font-size: 14px; color: #555; border: 1px solid #ddd; }
        .btn-main { width: 100%; background: #002b5c; color: white; border: none; padding: 16px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .fare-tag { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #333; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="bottom-sheet">
        <div class="input-box">📍 လက်ရှိတည်နေရာ: <b>မန္တလေးမြို့</b></div>
        <div class="input-box">🏁 သွားမည့်နေရာ: <b>ဈေးချိုဈေး (သရုပ်ပြ)</b></div>
        <div class="fare-tag">ခန့်မှန်းခြေ: 2,500 ကျပ်</div>
        <button id="book-btn" class="btn-main" onclick="sendBooking()">🚕 အခုပဲ တက္ကစီခေါ်မည်</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://qvnrrqjhzgaulfvrjcay.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2bnJycWpoemdhdWxmdnJqY2F5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTUwMDUsImV4cCI6MjA4ODA5MTAwNX0.ItRRfDMI7Go0F1kCJTXOzYrY620PpSMx_iy3qfXBxTc';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Map Initialize
        var map = L.map('map', { zoomControl: false }).setView([21.9588, 96.0891], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([21.9588, 96.0891]).addTo(map).bindPopup('သင်၏ တည်နေရာ').openPopup();

        async function sendBooking() {
            const btn = document.getElementById('book-btn');
            btn.disabled = true;
            btn.innerText = "ခေါ်ဆိုနေပါသည်...";

            // Database table columns matching
            const { data, error } = await _supabase.from('bookings').insert([{
                u_lat: 21.9588,
                u_lng: 96.0891,
                dest_lat: 21.9740,
                dest_lng: 96.1080,
                dest_name: 'Zegyo Market',
                fare: 2500,
                status: 'pending'
            }]).select();

            if (error) {
                alert("Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "🚕 အခုပဲ တက္ကစီခေါ်မည်";
            } else {
                alert("Booking အောင်မြင်ပါသည်။ Table ထဲတွင် Data စစ်ကြည့်နိုင်ပါပြီ။");
                btn.innerText = "ယာဉ်မောင်းကို ရှာဖွေနေသည်...";
            }
        }
    </script>
</body>
</html>
