<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Driver - GG Taxi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .header { background: #002b5c; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .booking-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #002b5c; }
        .dest-name { font-size: 18px; font-weight: bold; color: #333; }
        .fare { color: #28a745; font-weight: bold; font-size: 16px; margin: 5px 0; }
        .btn-accept { width: 100%; padding: 12px; background: #002b5c; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        #no-booking { text-align: center; color: #777; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>ယာဉ်မောင်း လက်ခံရန်စာမျက်နှာ</h2>
        <p>အသစ်တက်လာသော Booking များကို ဤနေရာတွင် ကြည့်ပါ</p>
    </div>

    <div id="booking-list">
        <p id="no-booking">ရှာဖွေနေပါသည်...</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://qvnrrqjhzgaulfvrjcay.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2bnJycWpoemdhdWxmdnJqY2F5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTUwMDUsImV4cCI6MjA4ODA5MTAwNX0.ItRRfDMI7Go0F1kCJTXOzYrY620PpSMx_iy3qfXBxTc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ၁။ Pending ဖြစ်နေသော Booking များကို ဆွဲထုတ်ခြင်း
        async function fetchBookings() {
            const { data, error } = await _supabase
                .from('bookings')
                .select('*')
                .eq('status', 'pending') // Pending ဖြစ်နေတာပဲပြမယ်
                .order('created_at', { ascending: false });

            const listDiv = document.getElementById('booking-list');
            listDiv.innerHTML = '';

            if (data.length === 0) {
                listDiv.innerHTML = '<p id="no-booking">လက်ရှိတွင် ခရီးသည် မရှိသေးပါ။</p>';
                return;
            }

            data.forEach(booking => {
                const card = document.createElement('div');
                card.className = 'booking-card';
                card.innerHTML = `
                    <div class="dest-name">📍 ${booking.dest_name || 'အမည်မသိနေရာ'}</div>
                    <div class="fare">💰 ခရီးခ: ${booking.fare} ကျပ်</div>
                    <div>အကွာအဝေး: ခန့်မှန်း (2.5 km)</div>
                    <button class="btn-accept" onclick="acceptBooking(${booking.id})">လက်ခံမည်</button>
                `;
                listDiv.appendChild(card);
            });
        }

        // ၂။ Booking ကို လက်ခံလိုက်ပြီး Status ပြောင်းခြင်း
        async function acceptBooking(id) {
            const { error } = await _supabase
                .from('bookings')
                .update({ status: 'accepted' }) // Status ကို update လုပ်မည်
                .eq('id', id);

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("ခရီးစဉ်ကို လက်ခံလိုက်ပါပြီ။");
                fetchBookings(); // List ကို Refresh လုပ်မယ်
            }
        }

        // ၃။ ၅ စက္ကန့်တစ်ခါ အလိုအလျောက် Check လုပ်ပေးခြင်း
        setInterval(fetchBookings, 5000);
        fetchBookings(); // အစမှာ တစ်ခါ run မယ်

    </script>
</body>
</html>
