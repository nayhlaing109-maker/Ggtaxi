<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi Driver - GG Taxi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --success: #28a745; --danger: #dc3545; --dark: #1a1a1a; --yellow: #ffc107; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f4f4; overflow: hidden; }
        #map { height: 100vh; width: 100%; position: absolute; z-index: 1; }
        .top-bar { background: var(--dark); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; position: relative; z-index: 2000; }
        #setup-screen { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .setup-box { width: 100%; max-width: 350px; }
        .setup-box input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn-start { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .job-card { position: absolute; bottom: 30px; left: 5%; width: 90%; background: white; z-index: 4000; border-radius: 20px; padding: 20px; display: none; text-align: center; box-shadow: 0 -5px 25px rgba(0,0,0,0.2); box-sizing: border-box; border-top: 5px solid var(--yellow); }
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-btn { flex: 1; border: none; padding: 16px; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <img src="https://cdn-icons-png.flaticon.com/512/3448/3448636.png" width="80" alt="taxi">
            <h2 style="margin: 15px 0;">ယာဉ်မောင်း အကောင့်</h2>
            <input type="text" id="driverCarNo" placeholder="ယာဉ်အမှတ် (ဥပမာ- 2D/1234)">
            <input type="tel" id="driverPhone" placeholder="ဖုန်းနံပါတ်">
            <button class="btn-start" onclick="startNow()">Online တက်မည်</button>
        </div>
    </div>

    <div class="top-bar">
        <span>GG TAXI - DRIVER</span>
        <span id="status-text" style="color:#ff4444;">● Offline</span>
    </div>

    <div id="map"></div>

    <div id="job-card" class="job-card">
        <h3 style="color: #666; margin: 0; font-size: 14px;">ခရီးစဉ်အသစ်</h3>
        <h1 id="fareVal" style="margin: 5px 0; color: var(--dark);">0 ကျပ်</h1>
        <p id="destDisplay" style="color: #444; font-size: 15px; margin-bottom: 15px;">📍 သွားမည့်နေရာ- </p>
        <div id="action-btns" class="btn-row">
            <button class="btn-btn" style="background:#888;" onclick="rejectJob()">ငြင်းပယ်မည်</button>
            <button class="btn-btn" style="background:var(--success);" onclick="acceptJob()">လက်ခံမည်</button>
        </div>
        <button id="endBtn" class="btn-btn" style="background:var(--danger); width:100%; display:none; margin-top:15px;" onclick="finishTrip()">ခရီးစဉ် ပြီးဆုံးပါပြီ</button>
    </div>

    <script>
        // Supabase ချိတ်ဆက်မှု (Key ကို s အသေးဖြင့် ပြင်ထားပါသည်)
        const SUPABASE_URL = 'https://qvmrqjhzgaulfvrjcay.supabase.co';
        const SUPABASE_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2bnJycWpoemdhdWxmdnJqY2F5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTUwMDUsImV4cCI6MjA4ODA5MTAwNX0.ItRRfDMI7Go0F1kCJTXOzYrY620PpSMx_iy3qfXBxTc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var map = L.map('map', { zoomControl: false }).setView([21.9588, 96.0891], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        let driverCar, driverPhone, currentTripId = null, myMarker, userMarker;

        // ယာဉ်မောင်း၏ တည်နေရာကို စောင့်ကြည့်ပြီး Database သို့ Real-time ပို့ခြင်း
        function startTracking() {
            navigator.geolocation.watchPosition(async (p) => {
                const lat = p.coords.latitude, lng = p.coords.longitude;
                
                if (!myMarker) {
                    myMarker = L.marker([lat, lng], { 
                        icon: L.icon({iconUrl:'https://cdn-icons-png.flaticon.com/512/854/854831.png', iconSize:[45,45]}) 
                    }).addTo(map);
                    map.setView([lat, lng], 15);
                } else {
                    myMarker.setLatLng([lat, lng]);
                }

                // ခရီးစဉ်အတွင်း ရောက်ရှိနေသည့် တည်နေရာကို Update လုပ်ခြင်း
                if (currentTripId) {
                    await _supabase.from('bookings').update({ 
                        driver_lat: lat, 
                        driver_lng: lng 
                    }).eq('id', currentTripId);
                }
            }, (err) => console.error(err), { enableHighAccuracy: true });
        }

        async function startNow() {
            driverCar = document.getElementById('driverCarNo').value;
            driverPhone = document.getElementById('driverPhone').value;
            
            if(!driverCar || !driverPhone) return alert("အချက်အလက်ဖြည့်ပါ");
            
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('status-text').innerText = "● Online";
            document.getElementById('status-text').style.color = "#28a745";
            
            setTimeout(() => { map.invalidateSize(); }, 500);
            startTracking();
            listenForJobs();
        }

        // ခရီးသည်ခေါ်ဆိုမှုများကို Real-time စောင့်ကြည့်ခြင်း
        function listenForJobs() {
            _supabase.channel('public:bookings')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bookings' }, payload => {
                const data = payload.new;
                if (data.status === 'pending') {
                    currentTripId = data.id;
                    document.getElementById('fareVal').innerText = data.fare + " ကျပ်";
                    document.getElementById('destDisplay').innerText = "📍 " + (data.dest_name || "သတ်မှတ်နေရာ");
                    document.getElementById('job-card').style.display = 'block';

                    if(userMarker) map.removeLayer(userMarker);
                    userMarker = L.marker([data.u_lat, data.u_lng]).addTo(map).bindPopup("ခရီးသည်").openPopup();
                }
            }).subscribe();
        }

        async function acceptJob() {
            if (!currentTripId) return;
            // ယာဉ်မောင်းအချက်အလက်နှင့် ခရီးစဉ်အခြေအနေ Update လုပ်ခြင်း
            const { error } = await _supabase.from('bookings').update({ 
                status: 'on_going', 
                driver_car: driverCar, 
                driver_phone: driverPhone 
            }).eq('id', currentTripId);

            if(!error) {
                document.getElementById('action-btns').style.display = 'none';
                document.getElementById('endBtn').style.display = 'block';
                alert("ခရီးစဉ် လက်ခံလိုက်ပါပြီ။");
            } else {
                alert("အမှားအယွင်းရှိပါသည်- " + error.message);
            }
        }

        async function finishTrip() {
            if(confirm("ခရီးစဉ် ပြီးဆုံးပြီလား?")) {
                await _supabase.from('bookings').update({ status: 'ended' }).eq('id', currentTripId);
                location.reload(); // App ကို Reset ပြန်လုပ်ခြင်း
            }
        }

        function rejectJob() { 
            document.getElementById('job-card').style.display = 'none'; 
            currentTripId = null; 
        }
    </script>
</body>
</html>
