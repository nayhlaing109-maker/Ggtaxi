<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GG Taxi Driver - Fixed Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --dark-bg: #f8f9fa;
            --card-bg: #ffffff;
            --accent: #007bff;
            --success: #00c853;
            --danger: #ff3d00;
            --text: #333333;
            --warning: #ffca28;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* Login */
        #login-section { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #001a35 0%, #000000 100%); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: rgba(22, 27, 34, 0.9); padding: 40px 30px; border-radius: 30px; width: 85%; max-width: 360px; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .login-card input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; background: #0d1117; border-radius: 12px; color: white; outline: none; }

        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .top-nav { position: relative; z-index: 1001; background: rgba(255, 255, 255, 0.9); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .balance-pill { background: #f1f3f4; padding: 8px 12px; border-radius: 50px; font-weight: 700; display: flex; align-items: center; gap: 6px; }

        .ui-container { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 1006; padding: 20px; pointer-events: none; }
        #ui-render { pointer-events: auto; max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .btn { width: 100%; padding: 14px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; font-size: 15px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-gmaps { background: #34a853; color: white; }
        
        .receipt-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }

        #history-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2100; display: none; flex-direction: column; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-card">
            <div style="background: var(--accent); width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;"><i class="fa-solid fa-taxi fa-2x" style="color: white;"></i></div>
            <h2>GG TAXI DRIVER</h2>
            <input type="number" id="login-id" placeholder="ယာဉ်မောင်း ID">
            <input type="password" id="login-pw" placeholder="Password">
            <button class="btn btn-primary" onclick="handleLogin()">Login ဝင်မည်</button>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <div class="top-nav">
            <div class="balance-pill">
                <i class="fa-solid fa-wallet" style="color: var(--warning);"></i>
                <span id="driver-balance">0</span> <small>K</small>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span id="status-text" style="font-size: 12px; font-weight: bold; color: #777;">OFFLINE</span>
                <label class="switch">
                    <input type="checkbox" id="status-toggle" onchange="handleStatusChange()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div id="map"></div>
        <div class="ui-container"><div id="ui-render"></div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script>
        const SUPABASE_URL = 'https://qvnrrqjhzgaulfvrjcay.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2bnJycWpoemdhdWxmdnJqY2F5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTUwMDUsImV4cCI6MjA4ODA5MTAwNX0.ItRRfDMI7Go0F1kCJTXOzYrY620PpSMx_iy3qfXBxTc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map, myMarker, routeControl, activeJob = null, isOnline = false, pollInterval, myPos = { lat: 21.9588, lng: 96.0891 }, driverId = localStorage.getItem('driver_id');

        async function handleLogin() {
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            const { data } = await _supabase.from('drivers').select('*').eq('id', id).eq('password', pw).single();
            if (data) {
                localStorage.setItem('driver_id', data.id);
                driverId = data.id;
                initApp(data.balance);
            } else { alert("အချက်အလက်မှားယွင်းနေပါသည်။"); }
        }

        function initApp(balance) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('driver-balance').innerText = Number(balance).toLocaleString();
            setupMap();
            startLocationTracking();
        }

        function setupMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([myPos.lat, myPos.lng], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            myMarker = L.circleMarker([myPos.lat, myPos.lng], { radius: 8, fillColor: "#007bff", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map);
        }

        function startLocationTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    if(myMarker) myMarker.setLatLng([myPos.lat, myPos.lng]);
                }, null, { enableHighAccuracy: true });
            }
        }

        function handleStatusChange() {
            isOnline = document.getElementById('status-toggle').checked;
            document.getElementById('status-text').innerText = isOnline ? "ONLINE" : "OFFLINE";
            if (isOnline) { pollBookings(); pollInterval = setInterval(pollBookings, 5000); }
            else { clearInterval(pollInterval); document.getElementById('ui-render').innerHTML = ""; }
        }

        async function pollBookings() {
            if (!isOnline || activeJob) return;
            const { data } = await _supabase.from('bookings').select('*').eq('status', 'pending');
            if (data && data.length > 0) {
                const job = data[0];
                document.getElementById('ui-render').innerHTML = `
                    <div class="card">
                        <div style="font-weight:bold; margin-bottom:10px;">📍 ${job.dest_addr}</div>
                        <div style="font-size:20px; color:var(--success); font-weight:bold; margin-bottom:15px;">${Number(job.fare).toLocaleString()} K</div>
                        <button class="btn btn-primary" onclick="acceptJob(${job.id})">လက်ခံမည်</button>
                    </div>`;
            }
        }

        async function acceptJob(id) {
            const { data } = await _supabase.from('bookings').update({ status: 'accepted', driver_id: driverId }).eq('id', id).select().single();
            if (data) {
                activeJob = data;
                const gmapUrl = `https://www.google.com/maps/dir/?api=1&origin=${myPos.lat},${myPos.lng}&destination=${data.u_lat},${data.u_lng}&travelmode=driving`;
                document.getElementById('ui-render').innerHTML = `
                    <div class="card">
                        <div style="text-align:center; margin-bottom:10px; font-weight:bold; color:var(--accent);">ခရီးသည်ဆီသို့ သွားရန်</div>
                        <a href="${gmapUrl}" target="_blank" class="btn btn-gmaps"><i class="fa-solid fa-map-location-dot"></i> Google Maps ဖြင့်သွားမည်</a>
                        <div style="display:flex; gap:8px;">
                            <a href="tel:${activeJob.u_phone}" class="btn btn-primary">ဖုန်းဆက်မည်</a>
                            <button class="btn btn-success" onclick="startTrip()">ရောက်ရှိပြီ</button>
                        </div>
                    </div>`;
            }
        }

        function startTrip() {
            const gmapUrl = `https://www.google.com/maps/dir/?api=1&origin=${activeJob.u_lat},${activeJob.u_lng}&destination=${activeJob.dest_lat},${activeJob.dest_lng}&travelmode=driving`;
            document.getElementById('ui-render').innerHTML = `
                <div class="card">
                    <div style="text-align:center; margin-bottom:10px; font-weight:bold; color:var(--success);">ခရီးစဉ် စတင်နေပြီ</div>
                    <a href="${gmapUrl}" target="_blank" class="btn btn-gmaps"><i class="fa-solid fa-location-arrow"></i> Google Maps လမ်းညွှန်</a>
                    <button class="btn btn-primary" onclick="showReceipt()">ခရီးစဉ် ပြီးဆုံးပြီ</button>
                </div>`;
        }

        function showReceipt() {
            const totalFare = Number(activeJob.fare);
            const platformFee = 100;
            const commission = Math.round((totalFare - platformFee) * 0.14);
            const driverEarnings = totalFare - platformFee - commission;
            const totalDeduction = platformFee + commission;

            document.getElementById('ui-render').innerHTML = `
                <div class="card">
                    <h3 style="text-align:center; margin-top:0;">ဘေရှင်းတမ်း</h3>
                    <div class="receipt-row"><span>စုစုပေါင်း ရငွေ</span> <span>${totalFare.toLocaleString()} K</span></div>
                    <div class="receipt-row"><span>Platform Fee</span> <span style="color:var(--danger);">- ${platformFee} K</span></div>
                    <div class="receipt-row"><span>ကော်မရှင် (14%)</span> <span style="color:var(--danger);">- ${commission.toLocaleString()} K</span></div>
                    <div style="display:flex; justify-content:space-between; padding:15px 0; font-weight:bold; font-size:18px; color:var(--success);"><span>အသားတင် ရငွေ</span> <span>${driverEarnings.toLocaleString()} K</span></div>
                    <button class="btn btn-success" onclick="completeJob(${totalDeduction})">အတည်ပြုသည်</button>
                </div>`;
        }

        async function completeJob(deductionAmount) {
            // 1. နောက်ဆုံးလက်ကျန်ငွေကို Database မှ အရင်စစ်မည် (တိကျစေရန်)
            const { data: driverData } = await _supabase.from('drivers').select('balance').eq('id', driverId).single();
            
            if (driverData) {
                const updatedBalance = driverData.balance - deductionAmount;
                
                // 2. လက်ကျန်ငွေ နှုတ်မည်
                const { error: balError } = await _supabase.from('drivers').update({ balance: updatedBalance }).eq('id', driverId);
                
                // 3. Booking ကို status ပြောင်းမည်
                const { error: bookError } = await _supabase.from('bookings').update({ status: 'completed' }).eq('id', activeJob.id);

                if (!balError && !bookError) {
                    alert("ခရီးစဉ် ပြီးဆုံးပါပြီ။ ဝန်ဆောင်ခ နှုတ်ယူပြီးပါပြီ။");
                    location.reload();
                } else {
                    alert("အမှားအယွင်းတစ်ခု ဖြစ်ပွားခဲ့သည်။");
                }
            }
        }

        window.onload = async () => {
            if (driverId) {
                const { data } = await _supabase.from('drivers').select('*').eq('id', driverId).single();
                if (data) initApp(data.balance);
            }
        };
    </script>
</body>
</html>
