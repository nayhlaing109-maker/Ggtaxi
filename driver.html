<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi Driver - Complete Tracking UI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --success: #28a745; --danger: #dc3545; --warning: #ffc107; --dark: #333; --bg: #f8f9fa; --text-muted: #6c757d; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); overflow: hidden; }
        #map { height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Top Bar */
        .top-bar { background: var(--dark); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; position: relative; z-index: 2000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* Setup Screen */
        #setup-screen { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .setup-box input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .btn-start { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* Job Card Overlay */
        .job-card { position: absolute; bottom: 30px; left: 5%; width: 90%; background: white; z-index: 4000; border-radius: 25px; padding: 25px; border-top: 6px solid var(--warning); display: none; box-sizing: border-box; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .job-fare { font-size: 30px; font-weight: bold; color: var(--dark); margin: 10px 0; }
        .job-dest { color: var(--text-muted); font-size: 15px; margin-bottom: 20px; line-height: 1.4; }
        
        /* Buttons design */
        .btn-row { display: flex; gap: 10px; justify-content: center; width: 100%; }
        .btn-action { flex: 1; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; transition: 0.2s; }
        .btn-accept { background: var(--success); }
        .btn-reject { background: #6c757d; }
        .btn-end { background: var(--danger); width: 100%; }
        .btn-action:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <img src="https://cdn-icons-png.flaticon.com/512/854/854831.png" width="80" style="margin-bottom: 10px;">
            <h2 style="margin-bottom: 5px;">Taxi Driver Mode</h2>
            <p style="color: #888; margin-top: 0;">အချက်အလက်ဖြည့်သွင်းပါ</p>
            <input type="text" id="driverCarNo" placeholder="ယာဉ်အမှတ် (YGN 1234)">
            <input type="tel" id="driverPhone" placeholder="ဖုန်းနံပါတ်">
            <button class="btn-start" onclick="startNow()">Online တက်မည်</button>
            <p id="loc-status" style="font-size: 13px; color: #dc3545; margin-top: 15px; font-weight: bold;">GPS အချက်အလက် စစ်ဆေးနေသည်...</p>
        </div>
    </div>

    <div class="top-bar">
        <span>Taxi Driver</span>
        <span id="online-status-text" style="color: #ff4444;"><span class="status-dot" style="background:#ff4444;"></span>Offline</span>
    </div>

    <div id="map"></div>

    <div id="job-card" class="job-card">
        <h3 style="margin: 0; color: var(--warning);">🔔 ခရီးစဉ်အသစ် တောင်းဆိုမှု</h3>
        <div class="job-fare"><span id="fareVal">0</span> ကျပ်</div>
        <div id="destDisplay" class="job-dest">📍 ပို့ဆောင်ရမည့်နေရာ- </div>
        
        <div id="action-btns" class="btn-row">
            <button class="btn-action btn-reject" onclick="rejectJob()">ငြင်းပယ်မည်</button>
            <button class="btn-action btn-accept" onclick="acceptJob()">လက်ခံမည်</button>
        </div>
        
        <button id="endBtn" class="btn-action btn-end" style="display: none;" onclick="finishTrip()">ခရီးစဉ် ပြီးဆုံးပါပြီ</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCkooRElTxGdSkQI5ya8t3CKxoLSKjOQOs",
            authDomain: "ggtaxi-29fa2.firebaseapp.com",
            databaseURL: "https://ggtaxi-29fa2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ggtaxi-29fa2",
            storageBucket: "ggtaxi-29fa2.firebasestorage.app",
            messagingSenderId: "826464431760",
            appId: "1:826464431760:web:3569926d691d5b85b8f215"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        var map = L.map('map', { zoomControl: false }).setView([21.9588, 96.0891], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '©OSM' }).addTo(map);

        let driverCar, driverPhone, currentTripId = null;
        let myLocMarker = null, userMarker = null, destMarker = null, routeLayer = null;

        const carIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/854/854831.png',
            iconSize: [45, 45], iconAnchor: [22, 22]
        });

        const destIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
            iconSize: [40, 40], iconAnchor: [20, 40]
        });

        function updateDriverPin(lat, lng) {
            if (!myLocMarker) {
                myLocMarker = L.marker([lat, lng], { icon: carIcon, zIndexOffset: 1000 }).addTo(map).bindPopup("ကျွန်ုပ်၏ တည်နေရာ");
                map.setView([lat, lng], 15);
            } else {
                myLocMarker.setLatLng([lat, lng]);
            }
        }

        function startTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(p => {
                    const lat = p.coords.latitude, lng = p.coords.longitude;
                    updateDriverPin(lat, lng);
                    document.getElementById('loc-status').innerText = "တည်နေရာ ရရှိပါပြီ ✅ Online တက်နိုင်ပါပြီ";
                    document.getElementById('loc-status').style.color = "green";
                }, err => {
                    document.getElementById('loc-status').innerText = "GPS Error: " + err.message;
                }, { enableHighAccuracy: true });

                navigator.geolocation.watchPosition(p => {
                    const lat = p.coords.latitude, lng = p.coords.longitude;
                    updateDriverPin(lat, lng);
                    if (currentTripId) {
                        db.ref('bookings/' + currentTripId).update({ driver_lat: lat, driver_lng: lng });
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        window.onload = startTracking;

        function startNow() {
            driverCar = document.getElementById('driverCarNo').value;
            driverPhone = document.getElementById('driverPhone').value;
            if (!driverCar || !driverPhone) return alert("အချက်အလက်ဖြည့်ပါ");
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('online-status-text').innerHTML = '<span class="status-dot" style="background:#28a745;"></span>Online';
            document.getElementById('online-status-text').style.color = "#28a745";
            setTimeout(() => { map.invalidateSize(); }, 500);
            startListeningJobs();
        }

        function startListeningJobs() {
            db.ref('bookings').on('child_added', snap => {
                let data = snap.val();
                if (data && data.status === 'pending') {
                    currentTripId = snap.key;
                    document.getElementById('fareVal').innerText = data.fare;
                    document.getElementById('destDisplay').innerText = "📍 ပို့ဆောင်ရမည့်နေရာ- " + data.dest;
                    document.getElementById('job-card').style.display = 'block';

                    // Pins on Map - User and Destination
                    if(userMarker) map.removeLayer(userMarker);
                    if(destMarker) map.removeLayer(destMarker);
                    
                    userMarker = L.marker([data.lat, data.lng]).addTo(map).bindPopup("ခရီးသည်");
                    destMarker = L.marker([data.destLat, data.destLng], { icon: destIcon }).addTo(map).bindPopup("ပို့ဆောင်ရမည့်နေရာ");

                    // Map View ညှိရန် (Driver, User, Dest အကုန်မြင်ရအောင်)
                    let bounds = L.latLngBounds([myLocMarker.getLatLng(), [data.lat, data.lng], [data.destLat, data.destLng]]);
                    map.fitBounds(bounds, { padding: [50, 50] });
                }
            });
        }

        function acceptJob() {
            db.ref('bookings/' + currentTripId).update({ 
                status: 'on_going', driver_car: driverCar, driver_phone: driverPhone
            }).then(() => {
                document.getElementById('action-btns').style.display = 'none';
                document.getElementById('endBtn').style.display = 'block';
                drawTripRoute();
            });
        }

        function rejectJob() {
            db.ref('bookings/' + currentTripId).update({ status: 'cancelled' });
            clearJobCard();
        }

        function clearJobCard() {
            document.getElementById('job-card').style.display = 'none';
            if(userMarker) map.removeLayer(userMarker);
            if(destMarker) map.removeLayer(destMarker);
            if(routeLayer) map.removeLayer(routeLayer);
            currentTripId = null;
        }

        async function drawTripRoute() {
            const snap = await db.ref('bookings/' + currentTripId).once('value');
            const data = snap.val();
            if(data && data.polyline) {
                if(routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.geoJSON(data.polyline, { style: { color: '#1a73e8', weight: 6 } }).addTo(map);
                map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });
            }
        }

        function finishTrip() {
            if (confirm("ခရီးစဉ် ပြီးဆုံးပြီလား?")) {
                db.ref('bookings/' + currentTripId).update({ status: 'ended' });
                clearJobCard();
                alert("ခရီးစဉ်ပြီးဆုံးပါပြီ။");
                window.location.reload();
            }
        }
    </script>
</body>
</html>
