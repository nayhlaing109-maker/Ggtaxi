<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi Driver - GG Taxi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #001a35; --success: #2ecc71; --red: #ff4757; --gray: #f1f2f6; --accent: #007bff; }
        body { font-family: sans-serif; background: #000; margin: 0; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; position: relative; }
        
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .status-bar { 
            background: rgba(0, 26, 53, 0.9); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            color: white; 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative; 
            z-index: 1001; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }

        .balance-box { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.3); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(24px); }

        .content { 
            position: relative; 
            z-index: 1000; 
            flex-grow: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            pointer-events: none; 
            padding-bottom: 30px;
        }
        
        #ui-area { pointer-events: auto; width: 100%; }

        .list-title { color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.8); font-weight: bold; font-size: 18px; margin-bottom: 12px; }

        .booking-card { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            border: 1px solid rgba(0,0,0,0.05);
        }

        .dest-name { font-size: 17px; font-weight: bold; color: #1a1a1a; margin-bottom: 10px; }
        .fare { color: #1a1a1a; font-weight: bold; font-size: 24px; margin: 15px 0; }
        .fare span.amount { color: var(--success); }
        
        .address-info { font-size: 14px; color: #555; margin-bottom: 6px; display: flex; align-items: start; gap: 8px; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        
        /* 🗺️ Google Map Navigation Button Style */
        .btn-nav { 
            background: #4285F4; 
            color: white; 
            padding: 12px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            width: 100%; 
            margin-bottom: 10px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(66, 133, 244, 0.3);
        }

        .btn-view { width: 100%; padding: 12px; background: #f0f7ff; color: var(--accent); border: 1.5px solid #d0e7ff; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-accept { flex: 2; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .btn-reject { flex: 1; padding: 16px; background: #fff; color: var(--red); border: 1.5px solid #eee; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-action { width: 100%; padding: 18px; color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .map-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); z-index: 2; pointer-events: none; }
        .leaflet-routing-container { display: none !important; }
        .custom-icon { display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="map-overlay"></div>

    <div class="status-bar">
        <div class="balance-box">
            <i class="fa-solid fa-coins" style="color: #f1c40f;"></i>
            <span id="driver-balance">15,000</span> K
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="status-text" style="font-size: 14px; font-weight: bold;">ပိတ်ထားသည်</span>
            <label class="switch">
                <input type="checkbox" id="on-off-toggle" onchange="toggleStatus()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="content">
        <div id="ui-area">
            <div style="text-align:center; padding: 30px; color:white; background: rgba(0,0,0,0.6); border-radius: 20px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);">
                <i class="fa-solid fa-tower-broadcast fa-3x" style="margin-bottom: 15px; color: var(--success);"></i><br>
                <span style="font-size: 18px; font-weight: bold;">ခရီးစဉ်များစောင့်ဆိုင်းရန်</span><br>
                <small style="opacity: 0.8;">Switch ကို On ပေးပါ</small>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script>
        const SUPABASE_URL = 'https://qvnrrqjhzgaulfvrjcay.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2bnJycWpoemdhdWxmdnJqY2F5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTUwMDUsImV4cCI6MjA4ODA5MTAwNX0.ItRRfDMI7Go0F1kCJTXOzYrY620PpSMx_iy3qfXBxTc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map, routeControl, isOnline = false, updateInterval;
        let myLoc = { lat: 21.9588, lng: 96.0891 }; 
        let activeBooking = null;

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([myLoc.lat, myLoc.lng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.circleMarker([myLoc.lat, myLoc.lng], { radius: 10, fillColor: "#2ecc71", color: "#fff", weight: 4, fillOpacity: 1 }).addTo(map);
        }

        // 🗺️ Google Maps App ဖွင့်ပေးမည့် Function
        function openGoogleNav(lat, lng) {
            const url = `google.navigation:q=${lat},${lng}`;
            window.location.href = url;
            // Fallback for browsers
            setTimeout(() => {
                window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
            }, 500);
        }

        function toggleStatus() {
            isOnline = document.getElementById('on-off-toggle').checked;
            const statusText = document.getElementById('status-text');
            if (isOnline) {
                statusText.innerText = "ဖွင့်ထားသည်"; statusText.style.color = "#2ecc71";
                fetchBookings();
                updateInterval = setInterval(fetchBookings, 5000);
            } else {
                statusText.innerText = "ပိတ်ထားသည်"; statusText.style.color = "white";
                clearInterval(updateInterval);
                location.reload();
            }
        }

        async function fetchBookings() {
            if (!isOnline || activeBooking) return;
            const { data } = await _supabase.from('bookings').select('*').eq('status', 'pending').order('created_at', { ascending: false });
            const uiArea = document.getElementById('ui-area');
            
            if (!data || data.length === 0) {
                uiArea.innerHTML = '<div style="text-align:center; color:white; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 20px;">လက်ရှိတွင် ခရီးသည် မရှိသေးပါ။</div>';
                return;
            }

            uiArea.innerHTML = '<div class="list-title">အနီးနားရှိ ခရီးစဉ်များ</div>';
            data.forEach(booking => {
                const card = document.createElement('div');
                card.className = 'booking-card';
                card.innerHTML = `
                    <div class="dest-name">📍 ${booking.dest_addr || 'အမည်မသိနေရာ'}</div>
                    <div class="address-info"><i class="fa-solid fa-location-arrow" style="color: #999;"></i> <span>စမှတ်: ${booking.pickup_addr || 'လက်ရှိနေရာ'}</span></div>
                    <div class="fare">💰 <span class="amount">${Number(booking.fare || 0).toLocaleString()} ကျပ်</span></div>
                    <button class="btn-view" onclick="drawRoute(${booking.u_lat}, ${booking.u_lng}, ${booking.dest_lat}, ${booking.dest_lng}, '#007bff')">
                        <i class="fa fa-map-location-dot"></i> လမ်းကြောင်းကြည့်မည်
                    </button>
                    <div class="btn-group">
                        <button class="btn-reject" onclick="rejectBooking()">ငြင်းမည်</button>
                        <button class="btn-accept" onclick="acceptBooking(${booking.id})">လက်ခံမည်</button>
                    </div>
                `;
                uiArea.appendChild(card);
            });
        }

        async function acceptBooking(bookingId) {
            const { data, error } = await _supabase.from('bookings').update({ status: 'accepted' }).eq('id', bookingId).select().single();
            if (!error && data) {
                activeBooking = data;
                clearInterval(updateInterval);
                const uiArea = document.getElementById('ui-area');
                uiArea.innerHTML = `
                    <div class="booking-card" style="border-left: 6px solid var(--accent);">
                        <div style="background: #eef7ff; color: var(--accent); padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; text-align:center;">
                           🚕 ခရီးသည်ထံသို့ သွားနေပါသည်
                        </div>
                        <button class="btn-nav" onclick="openGoogleNav(${activeBooking.u_lat}, ${activeBooking.u_lng})">
                            <i class="fa-brands fa-google"></i> Google Map ဖြင့်သွားမည်
                        </button>
                        <div class="address-info"><b>ကြိုရမည့်နေရာ:</b></div>
                        <div style="color: #333; margin-bottom: 15px;">${activeBooking.pickup_addr}</div>
                        <button class="btn-action" style="background:var(--primary);" onclick="arrivedAtUser()">ရောက်ရှိပြီ</button>
                    </div>
                `;
                drawRoute(myLoc.lat, myLoc.lng, activeBooking.u_lat, activeBooking.u_lng, '#2ecc71');
            }
        }

        function arrivedAtUser() {
            const uiArea = document.getElementById('ui-area');
            uiArea.innerHTML = `
                <div class="booking-card" style="border-left: 6px solid var(--success);">
                    <div style="background: #e8f9f0; color: var(--success); padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; text-align:center;">
                       🏁 ခရီးစဉ် စတင်နေပါပြီ
                    </div>
                    <button class="btn-nav" style="background: #34a853;" onclick="openGoogleNav(${activeBooking.dest_lat}, ${activeBooking.dest_lng})">
                        <i class="fa-solid fa-location-arrow"></i> ပန်းတိုင်သို့ လမ်းညွှန်ချက်ရယူမည်
                    </button>
                    <div class="address-info"><b>သွားမည့်နေရာ:</b></div>
                    <div style="color: #333; margin-bottom: 10px;">${activeBooking.dest_addr}</div>
                    <div class="fare">💰 ရရန်ငွေ: <span class="amount">${Number(activeBooking.fare).toLocaleString()} ကျပ်</span></div>
                    <button class="btn-action" style="background:var(--success);" onclick="finishTrip()">ခရီးစဉ် ပြီးဆုံးပြီ</button>
                </div>
            `;
            drawRoute(activeBooking.u_lat, activeBooking.u_lng, activeBooking.dest_lat, activeBooking.dest_lng, '#007bff');
        }

        function drawRoute(slat, slng, elat, elng, routeColor) {
            if (routeControl) map.removeControl(routeControl);
            routeControl = L.Routing.control({
                waypoints: [L.latLng(slat, slng), L.latLng(elat, elng)],
                lineOptions: { styles: [{ color: routeColor, weight: 7, opacity: 0.9 }] },
                createMarker: (i, wp) => {
                    return L.marker(wp.latLng, {
                        icon: L.divIcon({
                            className: 'custom-icon',
                            html: `<i class="fa-solid fa-location-dot" style="color:${i==0?'#007bff':'#ff4757'}; font-size:28px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);"></i>`,
                            iconSize: [30, 30], iconAnchor: [15, 30]
                        })
                    });
                },
                addWaypoints: false
            }).addTo(map);
            map.fitBounds([[slat, slng], [elat, elng]], { padding: [100, 100] });
        }

        async function finishTrip() {
            if(confirm("ခရီးစဉ် ပြီးဆုံးပြီလား?")) {
                await _supabase.from('bookings').update({ status: 'completed' }).eq('id', activeBooking.id);
                alert("ခရီးစဉ် အောင်မြင်စွာ ပြီးဆုံးပါသည်။");
                location.reload(); 
            }
        }

        function rejectBooking() {
            if(confirm("ဤခရီးစဉ်ကို ငြင်းပယ်မှာ သေချာပါသလား?")) {
                location.reload();
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
